services:
  - type: web
    name: rk-sucatas-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MELHOR_ENVIO_TOKEN
        sync: false
